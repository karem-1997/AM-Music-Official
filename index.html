<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali - Ali | الملوك</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* (تنسيقات CSS الخاصة بك التي أرسلتها سابقاً) */
        :root { --bg-color:#0a0a0a; --card-bg:rgba(20,20,20,0.6); --primary-color:#ff1a1a; --secondary-color:#cc0000; --text-color:#fff; --text-secondary:#b3b3b3; --input-bg:rgba(30,30,30,0.7); --border-color:rgba(255,26,26,0.3); --success-color:#00cc66; --warning-color:#ff9500; --glass-bg:rgba(255,255,255,0.05); --glass-border:rgba(255,26,26,0.2); }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body { background:linear-gradient(135deg,#0a0a0a 0%,#1a0000 50%,#0a0a0a 100%); color:var(--text-color); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
        .hamburger-btn { position:fixed; top:10px; right:10px; background:var(--glass-bg); border:1px solid var(--glass-border); padding:10px; border-radius:12px; cursor:pointer; z-index:1000; color:var(--primary-color); }
        .side-menu { position:fixed; top:0; right:0; width:260px; height:100%; background:var(--card-bg); backdrop-filter:blur(25px); transform:translateX(100%); transition:0.4s; z-index:1999; }
        .side-menu.active { transform:translateX(0); }
        .container { width:90%; max-width:800px; background:var(--card-bg); padding:20px; border-radius:20px; margin-top:80px; backdrop-filter:blur(20px); border:1px solid var(--glass-border); }
        .form-page { display:none; }
        .form-page.active { display:block; }
        button { width:100%; padding:14px; background:var(--primary-color); color:#fff; border:none; border-radius:10px; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body>

    <div class="hamburger-btn" onclick="toggleMenu()">☰</div>
    <div class="side-menu" id="sideMenu">
        <div style="padding:20px; color:var(--primary-color); font-weight:bold;">القائمة الرئيسية</div>
        <div class="side-menu-items" style="padding:10px;">
            <div class="side-menu-item" style="padding:15px; cursor:pointer;" onclick="showPage('home')">الرئيسية</div>
            <div class="side-menu-item" style="padding:15px; cursor:pointer;" onclick="showPage('form')">إضافة بيانات</div>
        </div>
    </div>

    <div class="container" id="home">
        <h2>مرحباً بك في لوحة تحكم الملوك</h2>
        <p style="text-align:center; margin-top:20px;">هذه واجهتك الأساسية.</p>
    </div>

    <div class="container form-page" id="form">
        <h2>نموذج الإدخال</h2>
        <div class="form-group" style="margin:20px 0;">
            <label>اسم المستخدم</label>
            <input type="text" style="width:100%; padding:10px; border-radius:10px;" placeholder="أدخل الاسم">
        </div>
        <button>إرسال البيانات</button>
    </div>

    <script>
        // دالة التحكم في القائمة
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        // دالة التنقل
        function showPage(pageId) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('form').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';
            toggleMenu();
        }

        // إعداد الصفحة عند التحميل
        window.onload = () => {
            document.getElementById('home').style.display = 'block';
        };
    </script>
</body>
</html>
